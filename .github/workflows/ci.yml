name: CI

# Run the four CLAUDE.md gates on every push and PR. A task is not "done" until
# all four are green (CLAUDE.md §"Toolchain & commands").
on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  gates:
    name: build / test / clippy / fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Match the pinned toolchain in rust-toolchain.toml exactly, plus the
      # components the gates need.
      - name: Install Rust 1.93.1 (clippy, rustfmt)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: clippy, rustfmt

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: cargo build --workspace
        run: cargo build --workspace

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check
